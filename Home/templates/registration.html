{% extends 'base.html' %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="registration">

<div class="register_wapper">
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="col-md-5"> <div class="card shadow-lg">
                <div class="card-body p-5">
                    <h3 class="card-title mb-4 text-center" 
                        style="background: linear-gradient(to right, #cd9d32, #f9e2af); 
                               -webkit-background-clip: text; 
                               -webkit-text-fill-color: transparent; 
                               font-weight: bold; font-size: 2rem;">
                        Sign Up
                    </h3>

                    <form id="registerForm" method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" name="name" id="name" placeholder="Enter your full name">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" class="form-control" name="email" id="email" placeholder="Enter your email">
                        </div>
                        <div class="mb-3">
                            <label for="number" class="form-label">Phone</label>
                            <input type="number" class="form-control" name="number" id="number" placeholder="Mobile Number" min="0">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" id="password" placeholder="Create a password">
                        </div>
                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label" >Confirm Password</label>
                            <input type="password" class="form-control" name="confirmPassword" id="confirmPassword" placeholder="Confirm your password">
                        </div>
                        
                        <button type="submit" class="btn btn-radiant w-100 py-2">Create Account</button>
                    </form>

                    <div class="text-center mt-3">
                       <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;">
    {% if success %}
        <div class="custom-toast animate-slide-in success-glow">
            <div class="toast-content d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <i class="fa fa-check-circle mr-2" style="color: #00ffcc;"></i>
                    <span style="color: #fff; font-weight: 500;">{{ success }}</span>
                </div>
                <span class="close-toast-btn" onclick="removeToast(this)">&times;</span>
            </div>
            <div class="progress-bar success-bar"></div>
        </div>
    {% endif %}
</div>
         <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;">
    {% if error %}
        <div class="custom-toast animate-slide-in error-glow">
            <div class="toast-content d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <i class="fa fa-exclamation-triangle mr-2" style="color: #ff4d4d;"></i>
                    <span style="color: #fff; font-weight: 500;">{{ error }}</span>
                </div>
                <span class="close-toast-btn" onclick="removeToast(this)">&times;</span>
            </div>
            <div class="progress-bar error-bar"></div>
        </div>
    {% endif %}
</div>
                        <p id="error" style="color: #ff4d4d;"></p>
                    </div>

                    <div class="text-center mt-4">
                        <p style="color: #b0b0b0;">Already have an account? 
                            <a href="{% url 'login' %}" style="color: #00f2fe; text-decoration: none; font-weight: 500;">Login here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</div>
{% endblock %}
