{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f0f0f; /* Deep Dark Background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }

        .verify-wrapper {
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.9)), 
                        url('{{ MEDIA_URL }}images/f2.png'); /* Matching Background Image */
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #121212 !important; /* Rich Black Card */
            border: 1px solid #333 !important;
            border-radius: 20px !important;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5) !important;
        }

        .card-header-gradient {
            background: linear-gradient(45deg, #000000, #2c3e50);
            padding: 30px;
            text-align: center;
        }

        .card-header-gradient h3 {
            margin: 0;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .form-control {
            background-color: #1a1a1a !important;
            border: 1px solid #444 !important;
            color: #00f2fe !important;
            border-radius: 12px !important;
            padding: 15px;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 8px;
            font-weight: bold;
        }

        .form-control:focus {
            border-color: #4facfe !important;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.4) !important;
            outline: none;
        }

        .btn-radiant {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            border: none;
            font-weight: bold;
            color: white;
            padding: 12px;
            border-radius: 10px;
            transition: 0.3s ease-in-out;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-radiant:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 242, 254, 0.5);
            color: white;
            opacity: 0.9;
        }

        .error-box {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .resend-link {
            color: #00f2fe;
            text-decoration: none;
            transition: 0.3s;
        }

        .resend-link:hover {
            color: #4facfe;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="verify-wrapper">
    <div class="container d-flex justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card">
                <div class="card-header-gradient">
                    <h3>Verify OTP</h3>
                </div>

                <div class="card-body p-5">
                    <p class="text-center text-secondary mb-4">
                        Please enter the 6-digit verification code sent to your email address.
                    </p>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <input type="text" name="otp" class="form-control" placeholder="000000" maxlength="6" required autofocus>
                        </div>
                        
                        <button type="submit" class="btn btn-radiant w-100">Verify Account</button>
                    </form>

                    {% if error %}
                        <div class="error-box text-center">
                            {{ error }}
                        </div>
                    {% endif %}

                    <div class="text-center mt-4">
                        <p class="text-secondary small">
                            Didn't receive the code? <br>
                            <a href="#" class="resend-link">Resend Code</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
