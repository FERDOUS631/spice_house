{% extends "admin/base_site.html" %}

{% block extrastyle %}
<style>
    /* 1. Overall Dashboard Background */
    body {
        background-color: #1a1e23 !important;
        color: #eeeeee !important;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    /* 2. Top Header Styling */
    #header {
        background: #222831 !important;
        color: #ffbe33 !important;
        border-bottom: 3px solid #ffbe33;
        padding: 12px 40px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    #branding h1 {
        color: #ffbe33 !important;
        font-size: 24px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        transition: all 0.3s ease;
    }

    #branding h1:hover {
        text-shadow: 0 0 15px rgba(255, 190, 51, 0.7);
        transform: scale(1.02);
    }

    /* 3. Navigation path (Breadcrumbs) */
    div.breadcrumbs {
        background: #393e46 !important;
        color: #ffbe33 !important;
        border-bottom: 1px solid #4e555f;
        padding: 10px 40px;
    }

    div.breadcrumbs a {
        color: #eeeeee !important;
        text-decoration: none;
    }

    div.breadcrumbs a:hover {
        color: #ffbe33 !important;
    }

    /* 4. Sidebar & Modules (Apps List) */
    .module h2, .module caption, .inline-group h2 {
        background: #ffbe33 !important;
        color: #222831 !important;
        font-weight: bold;
        text-transform: uppercase;
        padding: 10px;
    }

    .module {
        background: #222831 !important;
        border: 1px solid #393e46 !important;
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 20px;
    }

    /* 5. Modern Tables & Row Hover Glow */
    table thead th {
        background: #393e46 !important;
        color: #ffbe33 !important;
        border-bottom: 2px solid #ffbe33 !important;
        padding: 12px;
    }

    tr.row1 { background: #2c323c !important; }
    tr.row2 { background: #222831 !important; }
    
    tbody tr:hover {
        background-color: #3d4551 !important;
        transition: background 0.3s ease;
        box-shadow: inset 5px 0 0 #ffbe33; 
    }

    td, th {
        border-bottom: 1px solid #393e46 !important;
        color: #eeeeee !important;
        padding: 12px !important;
    }

    /* 6. Image Zoom Animation */
    .field-image img, .thumbnail img, td img {
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        border-radius: 6px !important;
        border: 1.5px solid #ffbe33 !important;
        object-fit: cover;
    }

    .field-image img:hover, td img:hover {
        transform: scale(3.5) !important; 
        box-shadow: 0 15px 30px rgba(0,0,0,0.8) !important;
        position: relative;
        z-index: 1000;
        cursor: pointer;
    }

    /* 7. Forms, Inputs & Select boxes */
    input[type=text], input[type=password], input[type=email], input[type=number], 
    textarea, select {
        background: #313844 !important;
        border: 1px solid #4e555f !important;
        color: #ffffff !important;
        border-radius: 6px;
        padding: 10px;
        margin-bottom: 5px;
    }

    input:focus {
        border-color: #ffbe33 !important;
        outline: none;
        box-shadow: 0 0 8px rgba(255, 190, 51, 0.3);
    }

    /* 8. Spice House Special Buttons */
    .button, input[type=submit], .submit-row input, a.button {
        background: #ffbe33 !important;
        color: #222831 !important;
        border: none !important;
        padding: 10px 25px !important;
        font-weight: 800 !important;
        text-transform: uppercase;
        border-radius: 30px !important; 
        transition: 0.3s all ease;
        cursor: pointer;
    }

    .button:hover, input[type=submit]:hover {
        background: #ffffff !important;
        color: #222831 !important;
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(255, 190, 51, 0.4);
    }

    .deletelink {
        background: #e63946 !important;
        color: white !important;
        border-radius: 20px !important;
        padding: 8px 20px !important;
    }

    /* 9. Sidebar App List Hover Effect */
    .model-product a, .model-order a, .model-category a {
        transition: padding-left 0.3s ease !important;
    }

    .model-product a:hover, .model-order a:hover {
        padding-left: 15px !important;
        color: #ffbe33 !important;
    }

    /* 10. Dashboard Fade-in Animation */
    #content {
        animation: pageSlideIn 0.5s ease-out;
    }

    @keyframes pageSlideIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}

{% block branding %}
<h1 id="site-name">
    <i class="fa fa-fire" style="color: #ffbe33; margin-right: 10px;"></i> 
    <a href="{% url 'admin:index' %}">Spice House Admin</a>
</h1>
{% endblock %}
